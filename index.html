<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Love ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
overflow-x:hidden;
}

/* star background */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:stars 120s linear infinite;
z-index:-1;
}

@keyframes stars{
from{background-position:0 0;}
to{background-position:10000px 5000px;}
}

/* typing */

#typing{
font-size:40px;
color:#ff4d88;
margin-top:80px;
}

/* countdown */

#countdown{
font-size:24px;
margin-top:10px;
}

/* gallery */

.gallery{
display:flex;
justify-content:center;
flex-wrap:wrap;
margin-top:40px;
}

.gallery img{
width:220px;
margin:10px;
border-radius:15px;
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.2);
}

/* buttons */

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
margin:10px;
}

.loveBtn{
background:#ff4d88;
color:white;
}

/* secret message */

.secret{
display:none;
font-size:22px;
margin-top:20px;
}

/* hearts */

.heart{
position:fixed;
font-size:24px;
color:red;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(100vh);}
}

.explode{
animation:explode 2s linear forwards;
}

@keyframes explode{
0%{transform:scale(0);}
100%{transform:translateY(-300px) scale(2);opacity:0;}
}

</style>

</head>

<body>

<!-- music -->

<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<h1 id="typing"></h1>

<div id="countdown"></div>

<h2>Our Memories 📸</h2>

<div class="gallery">

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">

</div>

<h2>💍 Will you marry me?</h2>

<button class="loveBtn" onclick="yes()">Yes ❤️</button>
<button onclick="no()">No 😢</button>

<br>

<button class="loveBtn" onclick="secret()">Unlock Secret Message 💌</button>

<p id="secretMessage" class="secret">

You came into my life quietly,<br>
but you became my happiness completely.<br><br>

Every smile of yours makes my world brighter.<br>
No matter what happens, my heart will always choose you.<br><br>

❤️ I Love You ❤️

</p>

<script>

/* typing animation */

const text="I Love You ❤️";
let i=0;

function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(type,100);
}
}

type();

/* countdown */

const loveDate=new Date("Feb 14 2026").getTime();

setInterval(function(){

const now=new Date().getTime();

const distance=loveDate-now;

const d=Math.floor(distance/(1000*60*60*24));
const h=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const m=Math.floor((distance%(1000*60*60))/(1000*60));
const s=Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
"Countdown to our special day ❤️ "+d+"d "+h+"h "+m+"m "+s+"s";

},1000);

/* proposal */

function yes(){
alert("You made me the happiest person ❤️");
heartExplosion();
}

function no(){
alert("Please think again 😭");
}

/* secret message */

function secret(){
document.getElementById("secretMessage").style.display="block";
}

/* heart rain */

function createHeart(){

let heart=document.createElement("div");

heart.innerHTML="💖";

heart.classList.add("heart");

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=Math.random()*3+2+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

setInterval(createHeart,300);

/* heart explosion */

function heartExplosion(){

for(let i=0;i<25;i++){

let heart=document.createElement("div");

heart.innerHTML="💖";

heart.classList.add("heart","explode");

heart.style.left=Math.random()*100+"vw";

heart.style.top="60vh";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},2000);

}

}

</script>

</body>
</html>
