<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Someone Special ❤️</title>
<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.card{
    background: rgba(255,255,255,0.15);
    padding:40px;
    border-radius:20px;
    backdrop-filter: blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
    font-size:40px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:white;
    color:#ff4b7d;
    font-size:18px;
    cursor:pointer;
    margin-top:20px;
}

button:hover{
    transform:scale(1.1);
}

#message{
    margin-top:20px;
    font-size:20px;
    display:none;
}
</style>
</head>

<body>

<div class="card">
<h1>Hi ❤️</h1>
<p>I made this website just for you</p>

<button onclick="showLove()">Click Here</button>

<p id="message">
You are the most special person in my life 💖 <br>
Will you always stay with me? ❤️
</p>
</div>

<script>
function showLove(){
    document.getElementById("message").style.display="block";
}
</script>

</body>
</html>
