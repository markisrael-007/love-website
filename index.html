<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Someone Special ❤️</title>
<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.card{
    background: rgba(255,255,255,0.15);
    padding:40px;
    border-radius:20px;
    backdrop-filter: blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
    font-size:40px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:white;
    color:#ff4b7d;
    font-size:18px;
    cursor:pointer;
    margin-top:20px;
}

button:hover{
    transform:scale(1.1);
}

#message{
    margin-top:20px;
    font-size:20px;
    display:none;
}
</style>
</head>

<body>

<div class="card">
<h1>Hi ❤️</h1>
<p>I made this website just for you</p>

<button onclick="showLove()">Click Here</button>

<p id="message">
You are the most special person in my life 💖 <br>
Will you always stay with me? ❤️
</p>
</div>

<script>
function showLove(){
    document.getElementById("message").style.display="block";
}
</script>

</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Someone Special ❤️</title>

<style>
body{
margin:0;
font-family:Arial;
background:#ff4b7d;
overflow:hidden;
text-align:center;
color:white;
}

.container{
margin-top:120px;
}

h1{
font-size:45px;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
margin:10px;
}

.yes{
background:#00ff88;
color:black;
}

.no{
background:#ff4444;
color:white;
}

img{
width:200px;
border-radius:20px;
margin-top:20px;
}

/* heart animation */
.heart{
position:fixed;
top:-10px;
color:red;
font-size:24px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10vh);
}
100%{
transform:translateY(110vh);
}
}
</style>
</head>

<body>

<!-- background music -->
<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
</audio>

<div class="container">

<h1>Hi ❤️</h1>
<h2>You are very special to me</h2>

<p>I made this website just for you 💖</p>

<!-- photo -->
<img src="https://i.imgur.com/4AiXzf8.jpeg">

<h2>Will you be my girlfriend? 🌹</h2>

<button class="yes" onclick="yes()">Yes 💖</button>
<button class="no" onclick="no()">No 😢</button>

<p id="result"></p>

</div>

<script>

/* proposal buttons */
function yes(){
document.getElementById("result").innerHTML="Yay! ❤️ I am the happiest person!";
}

function no(){
document.getElementById("result").innerHTML="Please think again 😭";
}

/* heart rain animation */
function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=Math.random()*3+2+"s";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);
}

setInterval(createHeart,200);

</script>

</body>
</html>
